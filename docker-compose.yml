services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: price-watcher-app
    working_dir: /var/www/html/src
    volumes:
      - ./:/var/www/html

  nginx:
    image: nginx:alpine
    container_name: price-watcher-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
  mysql:
    image: mysql:8.0
    container_name: price-watcher-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: price_watcher
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql

  mailhog:
    image: mailhog/mailhog
    container_name: price-watcher-mailhog
    ports:
      - "8025:8025"

volumes:
  mysql_data: